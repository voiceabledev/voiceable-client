# Public env vars are embedded in the Next.js client bundle by design (metadata,
# JSON-LD, sitemap, Stripe publishable key, etc.). Netlify secret scanning
# otherwise fails when those values appear in build output.
# Include both NEXT_PUBLIC_* and legacy VITE_* names configured in Netlify UI.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_API_BASE_URL,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,NEXT_PUBLIC_OPENAI_API_KEY,NEXT_PUBLIC_AGENT_ID,NEXT_PUBLIC_AGENT_API_KEY,NEXT_PUBLIC_INTEGRATION_WEBHOOK_API_KEY,NEXT_PUBLIC_BLOG_POSTS_API_PATH,VITE_PUBLIC_SITE_URL,VITE_API_BASE_URL,VITE_STRIPE_PUBLISHABLE_KEY,VITE_INTEGRATION_WEBHOOK_API_KEY,VITE_OPENAI_API_KEY,VITE_AGENT_ID,VITE_AGENT_API_KEY,PROD_VITE_STRIPE_PUBLISHABLE_KEY"
